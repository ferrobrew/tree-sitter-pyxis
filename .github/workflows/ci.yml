name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install tree-sitter CLI
        run: npm ci

      - name: Check the generated parser is up to date
        run: |
          npx tree-sitter generate
          if ! git diff --exit-code; then
            echo "::error::Generated files are stale. Run 'npx tree-sitter generate' and commit the result."
            exit 1
          fi

      - name: Run corpus tests
        run: npx tree-sitter test

      - name: Parse the example (must be error-free)
        run: npx tree-sitter parse -q examples/sample.pyxis

      - name: Validate the highlights query against the grammar
        run: npx tree-sitter query queries/highlights.scm examples/sample.pyxis
